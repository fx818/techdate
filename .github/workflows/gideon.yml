name: Gideon Agent

on:
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours — keeps the feed fresh
  workflow_dispatch:          # allow manual trigger
    inputs:
      reset:
        description: 'Delete all existing Gideon posts before fetching (refresh the feed)'
        type: boolean
        default: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r gideon/requirements.txt

      - name: Run Gideon
        env:
          # fetch.py reads NEXT_PUBLIC_SUPABASE_URL; the repo secret is named SUPABASE_URL.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GIDEON_RESET: ${{ inputs.reset }}
          APP_URL: ${{ secrets.APP_URL }}
          GIDEON_PUSH_SECRET: ${{ secrets.GIDEON_PUSH_SECRET }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python gideon/fetch.py
